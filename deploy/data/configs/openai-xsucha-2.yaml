topicer:
    cls: TagProposalV2
    config:
        model: "MoritzLaurer/mDeBERTa-v3-base-mnli-xnli"
        device: 0
        tag_proposal_threshold: 0.6
        find_probable_tags_threshold: 0.6
llm_service:
    cls: OpenAsyncAPI
    config:
        default_model: "gpt-5.4-mini"
        api_key: ""
        base_url: "https://openrouter.ai/api/v1"
embedding_service:
    cls: DefaultEmbeddingService
    config:
        service_url: "http://embedding-service:8001/"
        doc_endpoint: "/embed_documents"
        query_endpoint: "/embed_query"
        timeout: 30
db_connection:
    cls: WeaviateService
    config:
        host: "localhost"
        rest_port: 8080
        grpc_port: 50051
        chunks_limit: 1000